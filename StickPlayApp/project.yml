name: StickPlayApp
targets:
  StickPlayApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources: 
      - Sources
      - Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.huachun.StickPlayApp
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight, UIInterfaceOrientationPortraitUpsideDown]
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight, UIInterfaceOrientationPortraitUpsideDown]
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      LSApplicationQueriesSchemes: [infuse]
      NSAppTransportSecurity:
        NSAllowsArbitraryLoads: true
